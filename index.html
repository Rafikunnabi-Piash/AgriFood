<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        if (typeof window !== 'undefined') {
          try {
            var target = window;
            var desc = Object.getOwnPropertyDescriptor(target, 'fetch');
            if (!desc && window.Window && Window.prototype) {
              target = Window.prototype;
              desc = Object.getOwnPropertyDescriptor(target, 'fetch');
            }
            if (desc && !desc.set && desc.configurable) {
              Object.defineProperty(target, 'fetch', {
                get: desc.get || function() { return desc.value },
                set: function(val) {
                  // ignore setter to prevent 'Cannot set property fetch...' error
                },
                configurable: true,
                enumerable: desc.enumerable
              });
            }
          } catch(e) {}
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
